apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: circleguard-auth-service
          imagePullPolicy: Always
          ports:
            - containerPort: 8180
          readinessProbe:
            tcpSocket:
              port: 8180
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/circleguard_auth
            - name: SPRING_DATASOURCE_USERNAME
              value: admin
            - name: SPRING_DATASOURCE_PASSWORD
              value: password
            - name: SPRING_LDAP_URLS
              value: ldap://openldap:389
            - name: IDENTITY_SERVICE_URL
              value: http://identity-service:8083
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8180
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - port: 8180
      targetPort: 8180
