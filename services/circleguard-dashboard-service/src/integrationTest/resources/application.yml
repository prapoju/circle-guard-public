spring:
  application:
    name: circleguard-dashboard-service
  datasource:
    url: jdbc:postgresql://localhost:5432/circleguard_dashboard
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

promotion:
  service:
    url: ${PROMOTION_SERVICE_URL:http://localhost:8088}
