spring:
  application:
    name: circleguard-notification-service
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  mail:
    host: localhost
    port: 25
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8180}

identity:
  service:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8081}

lms:
  service:
    url: ${LMS_SERVICE_URL:https://lms.university.edu/api/v1}

push:
  gotify:
    url: ${PUSH_GOTIFY_URL:http://localhost:8080}
    token: ${PUSH_GOTIFY_TOKEN:MOCK_TOKEN}

room:
  booking:
    service:
      url: ${ROOM_BOOKING_SERVICE_URL:https://facilities.university.edu/api/v1/rooms}

notification:
  service:
    testing: ${NOTIFICATION_SERVICE_TESTING:https://circleguard.example.com/testing}
    isolation: ${NOTIFICATION_SERVICE_ISOLATION:https://circleguard.example.com/isolation}
    guidelines: ${NOTIFICATION_SERVICE_GUIDELINES:circleguard://guidelines}

jwt:
  secret: "my-super-secret-dev-key-32-chars-long-12345678"
  expiration: 3600000

qr:
  secret: "my-qr-secret-key-for-dev-1234567890"
  expiration: 300

server:
  port: 8082

resilience4j:
  circuitbreaker:
    configs:
      default:
        failureRateThreshold: 50
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        slowCallDurationThreshold: 2s
        slowCallRateThreshold: 50
        automaticTransitionFromOpenToHalfOpenEnabled: true
    instances:
      gotifyApi:
        baseConfig: default
